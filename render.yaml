services:
  - type: web
    name: item-manager-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        fromService:
          type: web
          name: item-manager-backend
          property: port
  - type: web
    name: item-manager-frontend
    env: static-site
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticSitePath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: ${item-manager-backend.host}/api